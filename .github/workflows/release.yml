name: Release

on:
  push:
    tags:
      - "v*"
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create, for example v1.0.0 or stable-latest"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: macos-14
    if: >-
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release target
        id: release_target
        run: |
          git fetch origin main --tags

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            IS_STABLE=true
            git checkout "${{ github.event.workflow_run.head_sha }}"
            TAG="main-$(git rev-parse --short=12 HEAD)"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            if [ "$TAG" = "stable-latest" ]; then
              IS_STABLE=true
              git checkout origin/main
              TAG="main-$(git rev-parse --short=12 HEAD)"
            else
              IS_STABLE=false
              git fetch --tags origin "$TAG"
              git checkout "$TAG"
            fi
          else
            TAG="${GITHUB_REF_NAME}"
            IS_STABLE=false
          fi

          if [ "$IS_STABLE" != "true" ] && ! [[ "$TAG" =~ ^v[0-9]+(\.[0-9]+){1,2}([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tags must look like v1.0.0, v1.0, or v1.0.0-beta.1" >&2
            exit 1
          fi

          if ! git branch -r --contains HEAD | grep -q 'origin/main'; then
            echo "Release tag must point to a commit contained in origin/main." >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "is_stable=$IS_STABLE" >> "$GITHUB_OUTPUT"
          echo "target_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Show Swift version
        run: swift --version

      - name: Test
        run: swift test

      - name: Build release binaries
        run: swift build -c release --arch arm64

      - name: Bundle app, CLI, and driver
        run: ./bundle.sh --with-driver

      - name: Prepare release assets
        run: |
          TAG="${{ steps.release_target.outputs.tag }}"
          IS_STABLE="${{ steps.release_target.outputs.is_stable }}"
          TARGET_SHA="${{ steps.release_target.outputs.target_sha }}"
          mkdir -p release-assets
          if [ "$IS_STABLE" = "true" ]; then
            ditto -c -k --keepParent NoNoiseMac.app "release-assets/NoNoiseMac.app.zip"
            cp NoNoiseMacCLI "release-assets/NoNoiseMacCLI"
            ditto -c -k --keepParent NoNoiseMic.driver "release-assets/NoNoiseMic.driver.zip"
            shasum -a 256 release-assets/* > "release-assets/SHA256SUMS.txt"
          else
            ditto -c -k --keepParent NoNoiseMac.app "release-assets/NoNoiseMac-${TAG}.app.zip"
            ditto -c -k --keepParent NoNoiseMacCLI "release-assets/NoNoiseMacCLI-${TAG}.zip"
            ditto -c -k --keepParent NoNoiseMic.driver "release-assets/NoNoiseMic-driver-${TAG}.zip"
            shasum -a 256 release-assets/* > "release-assets/SHA256SUMS-${TAG}.txt"
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.release_target.outputs.tag }}"
          IS_STABLE="${{ steps.release_target.outputs.is_stable }}"

          if [ "$IS_STABLE" = "true" ]; then
            if gh release view "$TAG" >/dev/null 2>&1; then
              gh release edit "$TAG" \
                --title "NoNoise Mac stable" \
                --notes "Latest successful Apple Silicon build from main. First launch may require right-click → Open because the app is ad-hoc signed." \
                --latest
            else
              gh release create "$TAG" \
                --title "NoNoise Mac stable" \
                --notes "Latest successful Apple Silicon build from main. First launch may require right-click → Open because the app is ad-hoc signed." \
                --target "$TARGET_SHA" \
                --latest
            fi

            gh release upload "$TAG" release-assets/* --clobber
          else
            gh release create "$TAG" release-assets/* \
              --title "NoNoise Mac $TAG" \
              --notes "Apple Silicon build of NoNoise Mac. First launch may require right-click → Open because the app is ad-hoc signed."
          fi
