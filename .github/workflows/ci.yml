name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build & Test (macOS, Apple Silicon)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build

      - name: Test
        run: swift test

      - name: Build (release)
        run: swift build -c release

      - name: Build NoNoise Mic driver (compile + sign check)
        run: ./build-driver.sh

      - name: Run driver host unit tests (ring + clock)
        run: ./Driver/tests/run-tests.sh
